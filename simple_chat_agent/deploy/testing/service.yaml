# Test web Service selects only the static frontend pods. The test worker
# streams to the test API Service.
apiVersion: v1
kind: Service
metadata:
  name: agent-harness-web-testing
  namespace: temporal-michaelj-agent-harness-demo
  labels:
    app: agent-harness-testing
spec:
  type: ClusterIP
  selector:
    app: agent-harness-testing
    component: web
  ports:
    - name: http
      port: 80
      targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: agent-harness-api-testing
  namespace: temporal-michaelj-agent-harness-demo
  labels:
    app: agent-harness-testing
spec:
  type: ClusterIP
  selector:
    app: agent-harness-testing
    component: api
  ports:
    - name: http
      port: 80
      targetPort: 8000
