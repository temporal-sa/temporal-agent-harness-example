# Isolated TEST stack (branch preview), in the same namespace as prod.
#
# Separate frontend + API + worker Deployments labelled `app:
# agent-harness-testing` so the prod Services never select these pods. Isolation
# in the shared namespace comes from SIMPLE_CHAT_TASK_QUEUE (own queue) +
# SIMPLE_CHAT_WORKFLOW_PREFIX (own registry ids). The test worker streams to the
# test API. Backends (S3, DynamoDB, secret, Temporal namespace) are shared with
# prod.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-harness-web-testing
  namespace: temporal-michaelj-agent-harness-demo
  labels:
    app: agent-harness-testing
    component: web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent-harness-testing
      component: web
  template:
    metadata:
      labels:
        app: agent-harness-testing
        component: web
    spec:
      automountServiceAccountToken: false
      containers:
        - name: web
          image: 429214323166.dkr.ecr.us-west-1.amazonaws.com/temporal-michaelj-agent-harness-demo:testing
          imagePullPolicy: IfNotPresent
          command:
            - uvicorn
            - simple_chat_agent.frontend.server:app
            - --host
            - 0.0.0.0
            - --port
            - "8080"
            - --proxy-headers
            - --forwarded-allow-ips
            - "*"
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-harness-api-testing
  namespace: temporal-michaelj-agent-harness-demo
  labels:
    app: agent-harness-testing
    component: api
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: agent-harness-testing
      component: api
  template:
    metadata:
      labels:
        app: agent-harness-testing
        component: api
    spec:
      serviceAccountName: agent-harness
      containers:
        - name: api
          image: 429214323166.dkr.ecr.us-west-1.amazonaws.com/temporal-michaelj-agent-harness-demo:testing
          imagePullPolicy: IfNotPresent
          command:
            - uvicorn
            - simple_chat_agent.api.main:app
            - --host
            - 0.0.0.0
            - --port
            - "8000"
            - --proxy-headers
            - --forwarded-allow-ips
            - "*"
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - secretRef:
                name: agent-harness-secrets
          env:
            - name: SIMPLE_CHAT_S3_BUCKET
              value: michaelj-agent-harness-claimcheck-429214323166
            - name: SIMPLE_CHAT_USER_EMAIL_SEARCH_ATTR
              value: UserEmail
            - name: SIMPLE_CHAT_DYNAMODB_TABLE
              value: temporal-michaelj-agent-harness-demo-oauth
            - name: SIMPLE_CHAT_ARTIFACTS_TABLE
              value: temporal-michaelj-agent-harness-demo-artifacts
            # Override shared prod secret values for OAuth redirect generation.
            - name: SIMPLE_CHAT_PUBLIC_URL
              value: https://agent-harness-demo.testing.tmprl-demo.cloud
            - name: SIMPLE_CHAT_SEARXNG_BASE_URL
              value: http://agent-harness-searxng.temporal-michaelj-agent-harness-demo.svc.cluster.local:8080
            - name: GITHUB_OAUTH_REDIRECT_URI
              value: https://agent-harness-demo.testing.tmprl-demo.cloud/oauth/github/callback
            - name: GOOGLE_OAUTH_REDIRECT_URI
              value: https://agent-harness-demo.testing.tmprl-demo.cloud/oauth/google/callback
            # --- test isolation ---
            - name: SIMPLE_CHAT_TASK_QUEUE
              value: simple-chat-agent-testing
            - name: SIMPLE_CHAT_WORKER_VERSION
              value: "1.0.0"
            - name: SIMPLE_CHAT_WORKFLOW_PREFIX
              value: testing-
            - name: SIMPLE_CHAT_DEMO_WORKSPACES_ENABLED
              value: "0"
            - name: SIMPLE_CHAT_DEMO_WORKSPACE_HOST_SUFFIX
              value: -agent-harness-demo.testing.tmprl-demo.cloud
            - name: SIMPLE_CHAT_DEMO_SOURCE_NAMESPACE
              value: temporal-michaelj-agent-harness-demo
            - name: SIMPLE_CHAT_DEMO_SOURCE_SECRET_NAME
              value: agent-harness-secrets
            - name: SIMPLE_CHAT_DEMO_TLS_SECRET_NAME
              value: agent-harness-workspace-testing-tls
            - name: SIMPLE_CHAT_DEMO_WORKSPACE_ROLE_ARN
              value: arn:aws:iam::429214323166:role/temporal-agent-harness-testing-worker
            - name: SIMPLE_CHAT_DEMO_SOURCE_WEB_DEPLOYMENT
              value: agent-harness-web-testing
            - name: SIMPLE_CHAT_DEMO_SOURCE_API_DEPLOYMENT
              value: agent-harness-api-testing
            - name: SIMPLE_CHAT_DEMO_SOURCE_WORKER_DEPLOYMENT
              value: agent-harness-worker-testing
          volumeMounts:
            - name: chat-data
              mountPath: /app/.simple_chat_agent
          readinessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
      volumes:
        - name: chat-data
          emptyDir: {}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-harness-worker-testing
  namespace: temporal-michaelj-agent-harness-demo
  labels:
    app: agent-harness-testing
    component: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent-harness-testing
      component: worker
  template:
    metadata:
      labels:
        app: agent-harness-testing
        component: worker
    spec:
      serviceAccountName: agent-harness-worker-testing
      containers:
        - name: worker
          image: 429214323166.dkr.ecr.us-west-1.amazonaws.com/temporal-michaelj-agent-harness-demo:testing
          imagePullPolicy: IfNotPresent
          command:
            - python
            - -m
            - simple_chat_agent.worker.main
          ports:
            - name: codec
              containerPort: 8001
          envFrom:
            - secretRef:
                name: agent-harness-secrets
          env:
            - name: SIMPLE_CHAT_S3_BUCKET
              value: michaelj-agent-harness-claimcheck-429214323166
            - name: SIMPLE_CHAT_USER_EMAIL_SEARCH_ATTR
              value: UserEmail
            - name: SIMPLE_CHAT_DYNAMODB_TABLE
              value: temporal-michaelj-agent-harness-demo-oauth
            - name: SIMPLE_CHAT_ARTIFACTS_TABLE
              value: temporal-michaelj-agent-harness-demo-artifacts
            # --- test isolation ---
            - name: SIMPLE_CHAT_TASK_QUEUE
              value: simple-chat-agent-testing
            - name: SIMPLE_CHAT_WORKER_VERSION
              value: "1.0.0"
            - name: SIMPLE_CHAT_WORKFLOW_PREFIX
              value: testing-
            - name: SIMPLE_CHAT_PUBLIC_URL
              value: https://agent-harness-demo.testing.tmprl-demo.cloud
            - name: SIMPLE_CHAT_STREAM_SINK_URL
              value: http://agent-harness-api-testing
            - name: SIMPLE_CHAT_SEARXNG_BASE_URL
              value: http://agent-harness-searxng.temporal-michaelj-agent-harness-demo.svc.cluster.local:8080
            - name: PYTHON_SANDBOX_LAMBDA_FUNCTION
              value: temporal-michaelj-agent-harness-demo-python-sandbox-testing
          volumeMounts:
            - name: chat-data
              mountPath: /app/.simple_chat_agent
          readinessProbe:
            tcpSocket:
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
      volumes:
        - name: chat-data
          emptyDir: {}
