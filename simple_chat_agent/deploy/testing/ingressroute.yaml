# Routes API/OAuth/internal paths to the test API Service and everything else
# to the static frontend Service.
---
apiVersion: traefik.containo.us/v1alpha1
kind: IngressRoute
metadata:
  name: agent-harness-testing
  namespace: temporal-michaelj-agent-harness-demo
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`agent-harness-demo.testing.tmprl-demo.cloud`) && PathPrefix(`/api`)
      priority: 1000
      services:
        - name: agent-harness-api-testing
          namespace: temporal-michaelj-agent-harness-demo
          passHostHeader: true
          port: 80
    - kind: Rule
      match: Host(`agent-harness-demo.testing.tmprl-demo.cloud`) && PathPrefix(`/oauth`)
      priority: 1000
      services:
        - name: agent-harness-api-testing
          namespace: temporal-michaelj-agent-harness-demo
          passHostHeader: true
          port: 80
    - kind: Rule
      match: Host(`agent-harness-demo.testing.tmprl-demo.cloud`) && PathPrefix(`/internal`)
      priority: 1000
      services:
        - name: agent-harness-api-testing
          namespace: temporal-michaelj-agent-harness-demo
          passHostHeader: true
          port: 80
    - kind: Rule
      match: Host(`agent-harness-demo.testing.tmprl-demo.cloud`)
      priority: 1000
      services:
        - name: agent-harness-web-testing
          namespace: temporal-michaelj-agent-harness-demo
          passHostHeader: true
          port: 80
  tls:
    secretName: agent-harness-testing-tls
---
apiVersion: traefik.containo.us/v1alpha1
kind: IngressRoute
metadata:
  name: agent-harness-testing-http
  namespace: temporal-michaelj-agent-harness-demo
spec:
  entryPoints:
    - web
  routes:
    - kind: Rule
      match: Host(`agent-harness-demo.testing.tmprl-demo.cloud`) && PathPrefix(`/api`)
      priority: 1000
      services:
        - name: agent-harness-api-testing
          namespace: temporal-michaelj-agent-harness-demo
          passHostHeader: true
          port: 80
    - kind: Rule
      match: Host(`agent-harness-demo.testing.tmprl-demo.cloud`) && PathPrefix(`/oauth`)
      priority: 1000
      services:
        - name: agent-harness-api-testing
          namespace: temporal-michaelj-agent-harness-demo
          passHostHeader: true
          port: 80
    - kind: Rule
      match: Host(`agent-harness-demo.testing.tmprl-demo.cloud`) && PathPrefix(`/internal`)
      priority: 1000
      services:
        - name: agent-harness-api-testing
          namespace: temporal-michaelj-agent-harness-demo
          passHostHeader: true
          port: 80
    - kind: Rule
      match: Host(`agent-harness-demo.testing.tmprl-demo.cloud`)
      priority: 1000
      services:
        - name: agent-harness-web-testing
          namespace: temporal-michaelj-agent-harness-demo
          passHostHeader: true
          port: 80
