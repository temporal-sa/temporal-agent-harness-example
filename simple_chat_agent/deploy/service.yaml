# Each Service targets its own Deployment by the `component` label: the web
# Service hits the static frontend pods (8080), the API Service hits FastAPI
# (8000), and the codec Service hits the worker pods (8001, the in-process
# codec server).
apiVersion: v1
kind: Service
metadata:
  name: agent-harness-web
  namespace: temporal-michaelj-agent-harness-demo
  labels:
    app: agent-harness
spec:
  type: ClusterIP
  selector:
    app: agent-harness
    component: web
  ports:
    - name: http
      port: 80
      targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: agent-harness-api
  namespace: temporal-michaelj-agent-harness-demo
  labels:
    app: agent-harness
spec:
  type: ClusterIP
  selector:
    app: agent-harness
    component: api
  ports:
    - name: http
      port: 80
      targetPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: agent-harness-codec
  namespace: temporal-michaelj-agent-harness-demo
  labels:
    app: agent-harness
spec:
  type: ClusterIP
  selector:
    app: agent-harness
    component: worker
  ports:
    - name: codec
      port: 80
      targetPort: 8001
