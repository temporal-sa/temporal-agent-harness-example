# Traefik IngressRoutes. HTTPS routes terminate TLS with the real Let's Encrypt
# certs issued by certificate.yaml (cert-manager). HTTP routes are kept for
# convenience/redirect and debugging.
---
# Web UI + API — HTTPS
apiVersion: traefik.containo.us/v1alpha1
kind: IngressRoute
metadata:
  name: agent-harness-web
  namespace: temporal-michaelj-agent-harness-demo
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`agent-harness-demo.tmprl-demo.cloud`) && PathPrefix(`/api`)
      services:
        - name: agent-harness-api
          namespace: temporal-michaelj-agent-harness-demo
          passHostHeader: true
          port: 80
    - kind: Rule
      match: Host(`agent-harness-demo.tmprl-demo.cloud`) && PathPrefix(`/oauth`)
      services:
        - name: agent-harness-api
          namespace: temporal-michaelj-agent-harness-demo
          passHostHeader: true
          port: 80
    - kind: Rule
      match: Host(`agent-harness-demo.tmprl-demo.cloud`) && PathPrefix(`/internal`)
      services:
        - name: agent-harness-api
          namespace: temporal-michaelj-agent-harness-demo
          passHostHeader: true
          port: 80
    - kind: Rule
      match: Host(`agent-harness-demo.tmprl-demo.cloud`)
      services:
        - name: agent-harness-web
          namespace: temporal-michaelj-agent-harness-demo
          passHostHeader: true
          port: 80
  tls:
    secretName: agent-harness-demo-tls
---
# Web UI + API — HTTP
apiVersion: traefik.containo.us/v1alpha1
kind: IngressRoute
metadata:
  name: agent-harness-web-http
  namespace: temporal-michaelj-agent-harness-demo
spec:
  entryPoints:
    - web
  routes:
    - kind: Rule
      match: Host(`agent-harness-demo.tmprl-demo.cloud`) && PathPrefix(`/api`)
      services:
        - name: agent-harness-api
          namespace: temporal-michaelj-agent-harness-demo
          passHostHeader: true
          port: 80
    - kind: Rule
      match: Host(`agent-harness-demo.tmprl-demo.cloud`) && PathPrefix(`/oauth`)
      services:
        - name: agent-harness-api
          namespace: temporal-michaelj-agent-harness-demo
          passHostHeader: true
          port: 80
    - kind: Rule
      match: Host(`agent-harness-demo.tmprl-demo.cloud`) && PathPrefix(`/internal`)
      services:
        - name: agent-harness-api
          namespace: temporal-michaelj-agent-harness-demo
          passHostHeader: true
          port: 80
    - kind: Rule
      match: Host(`agent-harness-demo.tmprl-demo.cloud`)
      services:
        - name: agent-harness-web
          namespace: temporal-michaelj-agent-harness-demo
          passHostHeader: true
          port: 80
---
# Codec server — HTTPS (required by Temporal Cloud to pass the access token)
apiVersion: traefik.containo.us/v1alpha1
kind: IngressRoute
metadata:
  name: agent-harness-codec
  namespace: temporal-michaelj-agent-harness-demo
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`codec.agent-harness-demo.tmprl-demo.cloud`)
      services:
        - name: agent-harness-codec
          namespace: temporal-michaelj-agent-harness-demo
          passHostHeader: true
          port: 80
  tls:
    secretName: codec-agent-harness-demo-tls
---
# Codec server — HTTP (for ACME HTTP-01 challenge convenience and debugging)
apiVersion: traefik.containo.us/v1alpha1
kind: IngressRoute
metadata:
  name: agent-harness-codec-http
  namespace: temporal-michaelj-agent-harness-demo
spec:
  entryPoints:
    - web
  routes:
    - kind: Rule
      match: Host(`codec.agent-harness-demo.tmprl-demo.cloud`)
      services:
        - name: agent-harness-codec
          namespace: temporal-michaelj-agent-harness-demo
          passHostHeader: true
          port: 80
